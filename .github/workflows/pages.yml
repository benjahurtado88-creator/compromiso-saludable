name: Deploy web to GitHub Pages

# Publica la carpeta web/ (la dApp) en GitHub Pages.
# Se ejecuta en cada push a main, o a mano desde la pestaña Actions.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues pisándose entre sí.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir la carpeta web/
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
